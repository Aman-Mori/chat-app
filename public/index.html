<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <meta name="color-scheme"
        content="light dark">

  <title>
    Chat System with Room and Password Protection
  </title>

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

</head>

<body>

  <!-- ============================== -->
  <!-- PRE CHAT FORM -->
  <!-- ============================== -->

  <div id="pre-chat-form">

    <h1>Chat Room</h1>

    <div id="room-choice">

      <button id="create-room-btn">
        Create Room
      </button>

      <button id="join-room-btn">
        Join Room
      </button>

    </div>

    <!-- CREATE ROOM -->

    <form id="create-room-form"
          class="hidden">

      <h2>Create Room</h2>

      <input type="text"
             id="create-username"
             placeholder="Enter your username"
             required>

      <input type="text"
             id="create-room-id"
             placeholder="Enter Room ID"
             required>

      <input type="password"
             id="create-room-password"
             placeholder="Set Room Password"
             required>

      <input type="number"
             id="create-max-users"
             placeholder="Max participants"
             min="2"
             max="10"
             required>

      <button type="submit">
        Create Room
      </button>

    </form>

    <!-- JOIN ROOM -->

    <form id="join-room-form"
          class="hidden">

      <h2>Join Room</h2>

      <input type="text"
             id="join-username"
             placeholder="Enter your username"
             required>

      <button id="fetch-rooms-btn">
        Fetch Available Rooms
      </button>

    </form>

    <!-- AVAILABLE ROOMS -->

    <div id="available-rooms"
         class="hidden">

      <h2>Available Rooms</h2>

      <table>

        <thead>

          <tr>
            <th>Room ID</th>
            <th>Max Users</th>
            <th>Action</th>
          </tr>

        </thead>

        <tbody id="rooms-table-body"></tbody>

      </table>

    </div>

  </div>

  <!-- ============================== -->
  <!-- CHAT APP -->
  <!-- ============================== -->

  <div id="chat-app"
       class="hidden">

    <header>

      <h1>
        Chat Room -
        <span id="room-name"></span>
      </h1>

    </header>

    <div id="chat-container">

      <!-- CHAT BOX -->
      <div id="chat-box"></div>

      <!-- INPUT SECTION -->
      <div id="chat-input-container">

        <!-- MESSAGE INPUT -->
        <input id="chat-input"
               type="text"
               placeholder="Type your message here..."
               autocomplete="off">

        <!-- SEND MESSAGE BUTTON -->
        <button id="send-chat-btn">
          Send
        </button>

      </div>

      <!-- ============================== -->
      <!-- FILE INPUT (HIDDEN ONLY) -->
      <!-- ============================== -->

      <input type="file"
             id="file-input"
             hidden
             accept=".jpg,.jpeg,.png,.pdf,.zip,.txt,.doc,.docx">

    </div>

  </div>

  <!-- SOCKET IO -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>

</html>
